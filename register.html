<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Связь с TheBSgorm</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- Официальный скрипт Telegram Web App для автозаполнения юзернейма -->
<script src="https://telegram.org"></script>

<style>
*{
    box-sizing:border-box;
}
body{
    margin:0;
    height:100vh;
    background:radial-gradient(circle at top, #110033, #03001e);
    font-family:'Segoe UI', Arial, sans-serif;
    color:#e5e7eb;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* Псевдо фон игры в цветах главного VIP-меню */
.bg-glow{
    position:fixed;
    inset:0;
    background:
        radial-gradient(circle at 20% 20%, rgba(0,242,254,.15), transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(0,114,255,.15), transparent 45%);
    z-index:-1;
}

.box{
    width:320px;
    background:linear-gradient(180deg,#0b1329,#03001ecc);
    border-radius:16px;
    padding:24px;
    box-shadow:
        0 0 0 1px rgba(0,242,254,.15),
        0 20px 40px rgba(0,0,0,.8);
    animation:fadeIn .6s ease;
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(10px)}
    to{opacity:1; transform:none}
}

.logo{
    text-align:center;
    font-size:22px;
    font-weight:700;
    letter-spacing:1px;
    margin-bottom:6px;
}
.logo span{
    color:#00f2fe;
}

.subtitle{
    text-align:center;
    font-size:13px;
    color:#9ca3af;
    margin-bottom:18px;
}

label{
    font-size:12px;
    color:#9ca3af;
}

input{
    width:100%;
    margin-top:6px;
    margin-bottom:14px;
    padding:11px;
    background:#03001e;
    border:1px solid #0072ff;
    border-radius:8px;
    color:#fff;
    outline:none;
}
input:focus{
    border-color:#00f2fe;
    box-shadow:0 0 0 2px rgba(0,242,254,.25);
}

button{
    width:100%;
    padding:12px;
    background:linear-gradient(90deg,#00f2fe,#0072ff);
    border:none;
    border-radius:10px;
    font-size:15px;
    font-weight:600;
    color:#fff;
    cursor:pointer;
    transition:.2s;
    margin-bottom:10px;
}
button:hover{
    filter:brightness(1.1);
}
button:active{
    transform:scale(.98);
}

/* СТИЛЬНАЯ КНОПКА НАЗАД В ХАБ */
.back-btn {
    width: 100%;
    padding: 10px;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 10px;
    font-size: 13px;
    font-weight: 600;
    color: #9ca3af;
    cursor: pointer;
    text-align: center;
    text-decoration: none;
    display: block;
    transition: .2s;
}
.back-btn:active {
    transform: scale(.98);
    background: rgba(255, 255, 255, 0.1);
}

.footer{
    margin-top:14px;
    text-align:center;
    font-size:11px;
    color:#6b7280;
}
</style>
</head>
<body>

<div class="bg-glow"></div>

<div class="box">
    <div class="logo">СВЯЗЬ — <span>TheBSgorm</span></div>
    <div class="subtitle">Официальная Связь с TheBSgorm</div>

    <label>От Кого (@юзернейм)</label>
    <input id="msg" placeholder="Введите Никнейм">

    <label>Текст Сообщения</label>
    <input id="size" placeholder="Например: Сделай нфт...">

    <button onclick="send()">Отправить</button>
    
    <!-- Кнопка возврата в меню хаба -->
    <a href="index.html" class="back-btn">◀ Назад в меню</a>

    <div class="footer">Экосистема TheBSgorm © 2026</div>
</div>

<script>
const tg = window.Telegram?.WebApp;
if (tg) { 
    tg.ready(); 
    tg.expand(); 
    // Автозаполнение поля "От Кого", если зашли через Telegram
    const tgUser = tg.initDataUnsafe?.user || {};
    if (tgUser.username) {
        document.getElementById("msg").value = "@" + tgUser.username;
    } else if (tgUser.first_name) {
        document.getElementById("msg").value = tgUser.first_name;
    }
}

const TOKEN = "8166736790:AAEzGTt_pywcGf_YN0HjaiOFsyXZpbs-3vs";
const CHAT_ID = "5591880317";

function send(){
    const msg = document.getElementById("msg").value.trim();
    const size = document.getElementById("size").value.trim();

    if(!msg || !size){
        alert("Заполните все поля");
        return;
    }

    const text =
`🎮 От Кого

👤 Человек: ${msg}
📏 Предложение: ${size}`;

    fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`,{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            chat_id: CHAT_ID,
            text: text
        })
    }).then(response => {
        if (response.ok) {
            alert("✅ Сообщение успешно отправлено создателю!");
            document.getElementById("size").value = "";
        } else {
            alert("❌ Ошибка Telegram API. Нажмите /start в боте!");
        }
    }).catch(error => {
        alert("❌ Ошибка сети при отправке!");
    });
}
</script>

</body>
</html>
