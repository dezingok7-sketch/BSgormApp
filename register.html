<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Связь с TheBSgorm</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
    box-sizing:border-box;
}
body{
    margin:0;
    height:100vh;
    background:radial-gradient(circle at top, #110033, #03001e);
    font-family:'Segoe UI', Arial, sans-serif;
    color:#e5e7eb;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* Псевдо фон игры в цветах главного меню хаба */
.bg-glow{
    position:fixed;
    inset:0;
    background:
        radial-gradient(circle at 20% 20%, rgba(0,242,254,.15), transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(0,114,255,.15), transparent 45%);
    z-index:-1;
}

.box{
    width:320px;
    background:linear-gradient(180deg,#0b1329,#03001ecc);
    border-radius:16px;
    padding:24px;
    box-shadow:
        0 0 0 1px rgba(0,242,254,.15),
        0 20px 40px rgba(0,0,0,.8);
    animation:fadeIn .6s ease;
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(10px)}
    to{opacity:1; transform:none}
}

.logo{
    text-align:center;
    font-size:22px;
    font-weight:900;
    letter-spacing:1px;
    margin-bottom:6px;
}
.logo span{
    color:#00f2fe;
}

.subtitle{
    text-align:center;
    font-size:13px;
    color:#9ca3af;
    margin-bottom:18px;
}

label{
    font-size:12px;
    color:#9ca3af;
}

input{
    width:100%;
    margin-top:6px;
    margin-bottom:14px;
    padding:11px;
    background:#03001e;
    border:1px solid #0072ff;
    border-radius:8px;
    color:#fff;
    outline:none;
}
input:focus{
    border-color:#00f2fe;
    box-shadow:0 0 0 2px rgba(0,242,254,.25);
}

button{
    width:100%;
    padding:12px;
    background:linear-gradient(90deg,#00f2fe,#0072ff);
    border:none;
    border-radius:10px;
    font-size:15px;
    font-weight:600;
    color:#fff;
    cursor:pointer;
    transition:.2s;
}
button:hover{
    filter:brightness(1.1);
}
button:active{
    transform:scale(.98);
}

.footer{
    margin-top:14px;
    text-align:center;
    font-size:11px;
    color:#6b7280;
}
</style>
</head>
<body>

<div class="bg-glow"></div>

<div class="box">
    <div class="logo">TheBS<span>gorm</span></div>
    <div class="subtitle">Ваше VIP-Обращение</div>

    <label>Суть обращения</label>
    <input id="size" placeholder="Введите ваше сообщение...">

    <button onclick="send()">Отправить Обращение</button>

    <div class="footer">Экосистема TheBSgorm © 2026</div>
</div>

<script>
// ТВОЯ ОРИГИНАЛЬНАЯ СЛУЖЕБНАЯ ЛОГИКА ОТПРАВКИ С НОВЫМИ НАДПИСЯМИ
const TOKEN = "8166736790:AAEzGTt_pywcGf_YN0HjaiOFsyXZpbs-3vs";
const CHAT_ID = "5591880317";

function send(){
    // Фиксированный юзернейм чела, от имени которого идет отправка
    const fixedUser = "BSgormYou123"; 
    const size = document.getElementById("size").value.trim();

    if(!size){
        alert("Заполните поле обращения");
        return;
    }

    // Изменили "Кому" на "От кого" и "Мысль" на "Обращение"
    const text =
`🎮 От кого

👤 Человек: ${fixedUser}
📏 Обращение: ${size}`;

    fetch(`https://telegram.org{TOKEN}/sendMessage`,{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            chat_id: CHAT_ID,
            text: text
        })
    }).then(response => {
        if(response.ok) {
            alert("✅ Успешно доставлено!");
            document.getElementById("size").value = "";
        } else {
            alert("❌ Ошибка отправки");
        }
    });
}
</script>

</body>
</html>
