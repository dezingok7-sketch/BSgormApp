<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Связь с TheBSgorm</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://telegram.org"></script>

<style>
* { box-sizing: border-box; }
body { 
    margin: 0; height: 100vh;
    background: radial-gradient(circle at top, #1e293b, #020617);
    font-family: 'Segoe UI', Arial, sans-serif; color: #e5e7eb;
    display: flex; justify-content: center; align-items: center;
}
.box {
    width: 320px; background: linear-gradient(180deg, #020617, #020617cc);
    border-radius: 16px; padding: 24px;
    box-shadow: 0 0 0 1px rgba(255,255,255,.05), 0 20px 40px rgba(0,0,0,.8);
}
h1 { font-size: 22px; font-weight: 700; text-align: center; margin: 0 0 6px 0; }
h1 span { color: #00f2fe; }
.subtitle { text-align: center; font-size: 13px; color: #9ca3af; margin-bottom: 18px; }
label { font-size: 12px; color: #9ca3af; }
input {
    width: 100%; margin-top: 6px; margin-bottom: 14px; padding: 11px;
    background: #020617; border: 1px solid #1e293b; border-radius: 8px; color: #fff; outline: none;
}
input:focus { border-color: #00f2fe; box-shadow: 0 0 0 2px rgba(0, 242, 254, 0.25); }
button {
    width: 100%; padding: 12px; background: linear-gradient(135deg, #00f2fe, #0072ff);
    border: none; border-radius: 10px; font-size: 15px; font-weight: 600; color: #fff; cursor: pointer;
}
button:active { transform: scale(.98); }
</style>
</head>
<body>

<div class="box">
    <h1>Связь с <span>TheBSgorm</span></h1>
    <div class="subtitle">Ваше VIP-Обращение</div>

    <label>Суть обращения</label>
    <input id="size" placeholder="Введите ваше сообщение...">

    <button onclick="send()">Напишите</button>
</div>

<script>
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); }

const TOKEN = "8166736790:AAEzGTt_pywcGf_YN0HjaiOFsyXZpbs-3vs";
const CHAT_ID = "5591880317";

function send(){
    const size = document.getElementById("size").value.trim();

    if(!size){
        alert("Заполните все поля");
        return;
    }

    // Безопасный сбор данных с защитой от ошибок
    let senderName = "Аноним";
    let senderUsername = "нет юзернейма";
    let senderId = "не определен";

    if (tg && tg.initDataUnsafe && tg.initDataUnsafe.user) {
        const u = tg.initDataUnsafe.user;
        senderName = (u.first_name + " " + (u.last_name || "")).trim();
        senderUsername = u.username ? "@" + u.username : "нет юзернейма";
        senderId = u.id || "не определен";
    } else {
        // Если тестируешь в обычном браузере
        senderName = "Локальный тест (Браузер)";
    }

    // Твой оригинальный текстовый формат лога
    const text =
`🎮 Кому: BSgormYou123

👤 Человек: ${senderName} (${senderUsername})
🆔 ID: ${senderId}
📏 Мысль: ${size}`;

    fetch(`https://telegram.org{TOKEN}/sendMessage`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            chat_id: CHAT_ID,
            text: text
        })
    })
    .then(response => {
        if (response.ok) {
            alert("✅ Успешно отправлено!");
            document.getElementById("size").value = "";
        } else {
            alert("❌ Ошибка отправки API Telegram");
        }
    })
    .catch(err => {
        alert("❌ Ошибка сети: " + err.message);
    });
}
</script>

</body>
</html>
