<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TheBSgorm NFT Clicker & Titles</title>
    <!-- Официальный скрипт Telegram Web App -->
    <script src="https://telegram.org"></script>
    <style>
        :root {
            --bg-color: #02040a;
            --text-color: #f1f5f9;
            --card-bg: rgba(7, 15, 36, 0.75); 
            --neon-cyan: #00f2fe;
            --neon-blue: #0072ff;
            --neon-space: rgba(0, 242, 254, 0.25);
            --glass-border: rgba(0, 242, 254, 0.16);
            /* Градиенты редкостей NFT */
            --rarity-common: #94a3b8;   
            --rarity-rare: #3b82f6;     
            --rarity-epic: #a855f7;     
            --rarity-mythic: #ef4444;   
            --rarity-secret: linear-gradient(90deg, #ff007f, #7928ca, #ff007f); 
        }

        @keyframes spaceGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(-45deg, #020617, #0b1329, #1c2541, #030712);
            background-size: 300% 300%;
            animation: spaceGradient 12s ease infinite;
            background-attachment: fixed;
            color: var(--text-color);
            margin: 0; padding: 15px;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; box-sizing: border-box; overflow-x: hidden;
        }

        /* --- БЛОК ОТОБРАЖЕНИЯ ТИТУЛА НАД БАЛАНСОМ --- */
        .user-title-badge {
            font-size: 11px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px;
            padding: 4px 12px; border-radius: 10px; margin-bottom: -4px; z-index: 10;
            background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 10px rgba(0,0,0,0.2); color: #94a3b8; transition: all 0.3s;
        }

        /* --- БЛОК БАЛАНСА МОНЕТ --- */
        .balance-box {
            background: var(--card-bg); border: 1px solid var(--glass-border);
            padding: 14px 28px; border-radius: 24px; font-size: 26px; font-weight: 900;
            color: var(--neon-cyan); text-shadow: 0 0 12px rgba(0, 242, 254, 0.5);
            margin: 10px 0 20px 0; backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.4); display: flex; align-items: center; gap: 10px;
        }

        /* --- КНОПКА ТАПА (КЛИКЕР-ПЛАНЕТА) --- */
        .planet-clicker {
            width: 145px; height: 145px; border-radius: 50%;
            background: radial-gradient(circle, #00f2fe 0%, #0052d4 60%, #02040a 100%);
            border: 4px solid rgba(255, 255, 255, 0.15); margin: 5px auto 25px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            font-size: 58px; box-shadow: 0 0 35px rgba(0, 242, 254, 0.6), inset 0 0 20px rgba(255,255,255,0.3);
            transition: all 0.15s ease; user-select: none; -webkit-user-select: none;
        }

        .click-floating-text {
            position: absolute; color: #00f2fe; font-weight: 900; font-size: 18px;
            pointer-events: none; animation: flyUpFade 0.5s ease-out forwards;
            text-shadow: 0 0 8px rgba(0, 242, 254, 0.6); z-index: 999;
        }
        @keyframes flyUpFade {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-60px) scale(0.8); opacity: 0; }
        }

        /* ИГРОВЫЕ ВКЛАДКИ (ИНВЕНТАРЬ / РУЛЕТКА / ТИТУЛЫ) */
        .game-tabs { display: flex; gap: 6px; width: 100%; max-width: 400px; background: rgba(0, 0, 0, 0.3); padding: 5px; border-radius: 16px; margin-bottom: 15px; }
        .g-tab-btn { flex: 1; background: none; border: none; color: #94a3b8; padding: 11px 2px; font-size: 12px; font-weight: 800; border-radius: 12px; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
        .g-tab-btn.active { background: var(--card-bg); color: var(--neon-cyan); border: 1px solid var(--glass-border); box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .section-title { font-size: 16px; font-weight: 850; align-self: flex-start; margin: 15px 0 10px 5px; color: #7dd3fc; letter-spacing: 1px; text-transform: uppercase; display: flex; justify-content: space-between; width: 100%; max-width: 400px; }
        .item-counter { font-size: 13px; color: #94a3b8; font-weight: 600; text-transform: none; letter-spacing: 0; }
        
        .cases-grid { display: flex; flex-direction: column; gap: 14px; width: 100%; max-width: 400px; margin-bottom: 25px; }
        .case-card {
            background: var(--card-bg); border: 1px solid var(--glass-border);
            padding: 18px; border-radius: 26px; display: flex; align-items: center; justify-content: space-between;
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); 
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); position: relative; overflow: hidden;
        }
        .case-card.bronze-glow { border-color: rgba(180, 83, 9, 0.3); }
        .case-card.silver-glow { border-color: rgba(148, 163, 184, 0.3); }
        .case-card.gold-glow { border-color: rgba(234, 179, 8, 0.35); }

        .case-info { display: flex; align-items: center; gap: 16px; }
        .case-icon { font-size: 42px; }
        .case-details { display: flex; flex-direction: column; gap: 3px; text-align: left; }
        .case-name { font-weight: 900; font-size: 16px; }
        .case-cost { font-size: 13px; color: var(--neon-cyan); font-weight: 800; }
        
        .case-actions { display: flex; flex-direction: column; gap: 6px; align-items: flex-end; }
        .game-btn {
            background: linear-gradient(135deg, #0284c7, var(--neon-blue)); color: white;
            border: none; padding: 11px 18px; border-radius: 14px; font-size: 13px; font-weight: 800;
            cursor: pointer; box-shadow: 0 4px 14px rgba(0, 114, 255, 0.4); transition: all 0.1s;
        }
        .game-btn:active { transform: scale(0.95); }
        .game-btn.disabled { opacity: 0.5; pointer-events: none; background: #334155; box-shadow: none; }
        .view-chances-link { font-size: 11px; color: #7dd3fc; text-decoration: none; font-weight: 700; cursor: pointer; opacity: 0.6; }

        /* --- СТИЛИ ДЛЯ ИНТЕРФЕЙСА КОНТРАКТОВ (РУЛЕТКИ) --- */
        .contract-workspace {
            display: none; width: 100%; max-width: 400px; background: var(--card-bg);
            border: 1px solid var(--glass-border); padding: 20px; border-radius: 26px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4); flex-direction: column; gap: 15px; margin-bottom: 25px;
        }
        .chance-progress-wrapper { width: 100%; text-align: center; margin-bottom: 5px; }
        .chance-text { font-size: 20px; font-weight: 900; color: #10b981; margin-bottom: 8px; }
        .chance-bar-outer { width: 100%; height: 12px; background: rgba(255,255,255,0.08); border-radius: 99px; overflow: hidden; }
        .chance-bar-inner { width: 0%; height: 100%; background: linear-gradient(90deg, #00f2fe, #10b981); transition: width 0.3s ease; }
        .selected-slots-row { display: flex; justify-content: center; gap: 6px; flex-wrap: wrap; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 16px; min-height: 50px; }
        .slot-pill { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); font-size: 12px; font-weight: 700; padding: 6px 12px; border-radius: 20px; display: flex; align-items: center; gap: 4px; }
        .slot-pill .remove-x { color: #ef4444; margin-left: 4px; cursor: pointer; font-weight: 900; }

        /* --- СТИЛИ ДЛЯ МАГАЗИНА ТИТУЛОВ ВНУТРИ ВЕБА --- */
        .titles-zone { display: none; width: 100%; max-width: 400px; flex-direction: column; gap: 12px; margin-bottom: 25px; }
        .title-card { background: var(--card-bg); border: 1px solid var(--glass-border); padding: 16px; border-radius: 22px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 8px 20px rgba(0,0,0,0.2); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        .title-info { display: flex; flex-direction: column; gap: 2px; text-align: left; }
        .title-badge { font-weight: 900; font-size: 14px; color: #ffffff; padding: 3px 10px; border-radius: 10px; width: fit-content; }
        .title-desc { font-size: 11px; color: #94a3b8; font-weight: 600; margin-top: 3px; line-height: 1.3; }
        .buy-btn { background: linear-gradient(135deg, #0284c7, var(--neon-blue)); color: white; border: none; padding: 11px 18px; border-radius: 14px; font-size: 13px; font-weight: 800; cursor: pointer; box-shadow: 0 4px 14px rgba(0, 114, 255, 0.4); }
        .buy-btn.purchased { background: #10b981; box-shadow: 0 4px 14px rgba(16, 185, 129, 0.3); pointer-events: none; }

        /* --- ИСПРАВЛЕННЫЕ СТИЛИ ИНВЕНТАРЯ --- */
        .inventory-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; width: 100%; max-width: 400px; margin-bottom: 30px; }
        .inventory-item { background: rgba(15, 23, 42, 0.55); border: 1px solid rgba(255,255,255,0.05); border-radius: 18px; padding: 14px 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px; position: relative; box-shadow: 0 6px 15px rgba(0,0,0,0.2); transition: transform 0.2s; cursor: pointer; }
        .inventory-item.selected-for-craft { border-color: #10b981 !important; box-shadow: 0 0 15px rgba(16, 185, 129, 0.4) !important; transform: scale(0.96); }
        .item-rarity-line { position: absolute; top: 0; left: 0; width: 100%; height: 5px; border-top-left-radius: 18px; border-top-right-radius: 18px; }
        .item-icon { font-size: 32px; margin-top: 4px; }
        .item-name { font-size: 11px; font-weight: 800; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 92%; }
        .item-count { position: absolute; bottom: 5p, mythic: 5, secret: 0 },
        silver: { common: 350, rare: 480, epic: 140, mythic: 28, secret: 2 },
        gold:   { common: 80, rare: 300, epic: 450, mythic: 160, secret: 10 }
    };

    const rarityNames = { common: "Обычный", rare: "Редкий", epic: "Эпический", mythic: "Мифический", secret: "СЕКРЕТНЫЙ" };
    const rarityColors = { common: "#94a3b8", rare: "#3b82f6", epic: "#a855f7", mythic: "#ef4444", secret: "#ff007f" };
    const nextRarityMap = { common: "rare", rare: "epic", epic: "mythic", mythic: "secret" };

    let userBalance = parseFloat(localStorage.getItem('game_balance')) || 0.0;
    let userInventory = JSON.parse(localStorage.getItem('game_inventory')) || {};
    let globalOpenCount = parseInt(localStorage.getItem('game_global_opens')) || 0;
    
    let canClick = true;
    let currentMode = "clicker"; 
    let selectedCraftItems = [];  

    const tg = window.Telegram?.WebApp;
    if (tg) { tg.ready(); tg.expand(); }

    function updateBalanceDisplay() {
        document.getElementById('balanceDisplay').innerText = userBalance.toFixed(3);
        document.getElementById('balanceDisplayTitles').innerText = userBalance.toFixed(3);
        localStorage.setItem('game_balance', userBalance);
    }

        // УМНЫЙ ТАПЕР С КУЛДАУНОМ 500 МС, СИЛОЙ КЛИКА И МЕГА-КРИТОМ +20.000
    document.getElementById('planetBtn').addEventListener('click', (e) => {
        if (!canClick) return;

        canClick = false;
        const planet = document.getElementById('planetBtn');
        
        planet.style.pointerEvents = 'none';
        planet.style.filter = 'grayscale(0.9) brightness(0.4)';
        planet.style.transform = 'scale(0.92)';

        // 1. Динамически считываем текущую силу клика (по умолчанию +0.005)
        let clickPower = parseFloat(localStorage.getItem('game_click_power')) || 0.005;
        let amountAdded = clickPower;
        let isMegaCrit = false;

        // 2. Проверяем, куплена ли технология Мега-Крита
        let hasCrit = localStorage.getItem('game_has_crit') === 'true';
        if (hasCrit) {
            let currentClicks = parseInt(localStorage.getItem('game_current_click_count')) || 0;
            let targetClicks = parseInt(localStorage.getItem('game_crit_target')) || 6;

            currentClicks += 1;

            if (currentClicks >= targetClicks) {
                // БУМ! Сработал Мега-Крит раз в 5-7 нажатий
                amountAdded = 20.000;
                isMegaCrit = true;

                // Сбрасываем счетчик и генерируем новое случайное число от 5 до 7 для следующего крита
                currentClicks = 0;
                let nextTarget = Math.floor(Math.random() * (7 - 5 + 1)) + 5;
                localStorage.setItem('game_crit_target', nextTarget);
            }
            localStorage.setItem('game_current_click_count', currentClicks);
        }

        userBalance += amountAdded;
        updateBalanceDisplay();

        if (tg && tg.HapticFeedback) {
            if (isMegaCrit) tg.HapticFeedback.notificationOccurred('success');
            else tg.HapticFeedback.impactOccurred('medium');
        }

        // Вылетающий текст (+0.005 или ЗОЛОТОЙ +20.000!)
        const floatText = document.createElement('div');
        floatText.className = 'click-floating-text';
        floatText.innerText = `+${amountAdded.toFixed(3)}`;
        
        if (isMegaCrit) {
            floatText.style.color = '#eab308';
            floatText.style.fontSize = '26px';
            floatText.style.textShadow = '0 0 15px #eab308';
        }
        
        floatText.style.left = `${e.clientX - 25}px`;
        floatText.style.top = `${e.clientY - 15}px`;
        document.body.appendChild(floatText);
        setTimeout(() => floatText.remove(), 500);

        setTimeout(() => {
            canClick = true;
            planet.style.pointerEvents = 'auto';
            planet.style.filter = 'none';
            planet.style.transform = 'none';
        }, 500);
    });

            
    window.switchMode = function(mode) {
        currentMode = mode;
        selectedCraftItems = []; 
        
        document.getElementById('modeClickerBtn').classList.toggle('active', mode === 'clicker');
        document.getElementById('modeContractBtn').classList.toggle('active', mode === 'contract');
        document.getElementById('modeTitlesBtn').classList.toggle('active', mode === 'titles');
        
        document.getElementById('clickerZone').style.display = mode === 'clicker' ? 'block' : 'none';
        document.getElementById('contractZone').style.display = mode === 'contract' ? 'flex' : 'none';
        document.getElementById('titlesZone').style.display = mode === 'titles' ? 'flex' : 'none';
        
        const title = document.getElementById('inventoryTitle');
        if (mode === 'clicker') title.innerText = '🎒 Твой NFT Инвентарь';
        else if (mode === 'contract') title.innerText = '🧪 Выберите скины в Контракт';
        else title.innerText = '📜 Твоя коллекция NFT (Магазин выше)';
        
        updateContractUI();
        renderInventory();
    }

    // РАСЧЁТ РЫНОЧНОЙ СТОИМОСТИ НА ОСНОВЕ ДЕФИЦИТА
    function calculateMarketStats(itemId, rarity, basePrice, countInInventory) {
        let rarityModifiers = { common: 8.5, rare: 2.1, epic: 0.6, mythic: 0.08, secret: 0.003 };
        let simulatedWorldTotal = Math.floor((globalOpenCount + 150) * rarityModifiers[rarity]) + 1;
        
        let scarcityMultiplier = 1.0;
        if (countInInventory > 1) {
            scarcityMultiplier = Math.max(0.4, 1 / Math.log2(countInInventory + 1));
        } else {
            scarcityMultiplier = 1.25;
        }
        return { worldTotal: simulatedWorldTotal, price: basePrice * scarcityMultiplier };
    }

    // ОТКРЫТИЕ КЕЙСОВ
    window.openCase = function(caseType, cost) {
        if (userBalance < cost) {
            if (tg && tg.showAlert) tg.showAlert("Недостаточно монет! Продолжай тапать по планете 🪐");
            else alert("Недостаточно монет!");
            return;
        }
        userBalance -= cost;
        globalOpenCount += 1;
        localStorage.setItem('game_global_opens', globalOpenCount);
        updateBalanceDisplay();

        const chances = caseChances[caseType];
        const randomNum = Math.floor(Math.random() * 1000) + 1;
        let selectedRarity = "common";

        if (randomNum <= chances.common) selectedRarity = "common";
        else if (randomNum <= chances.common + chances.rare) selectedRarity = "rare";
        else if (randomNum <= chances.common + chances.rare + chances.epic) selectedRarity = "epic";
        else if (randomNum <= chances.common + chances.rare + chances.epic + chances.mythic) selectedRarity = "mythic";
        else selectedRarity = "secret";

        const itemsList = nftItems[selectedRarity];
        const randomItem = itemsList[Math.floor(Math.random() * itemsList.length)];

        addAndShowItem(randomItem, selectedRarity, "🎉 РЕЛИКВИЯ НАЙДЕНА!");
    }
    function addAndShowItem(item, rarity, titleText) {
        if (userInventory[item.id]) {
            userInventory[item.id].count += 1;
        } else {
            userInventory[item.id] = { id: item.id, name: item.name, icon: item.icon, rarity: rarity, basePrice: item.basePrice, count: 1 };
        }
        localStorage.setItem('game_inventory', JSON.stringify(userInventory));

        let stats = calculateMarketStats(item.id, rarity, item.basePrice, userInventory[item.id].count);

        document.getElementById('rewardModalTitle').innerText = titleText;
        document.getElementById('rewardIcon').innerText = item.icon;
        document.getElementById('rewardName').innerText = item.name;
        
        const rarityText = document.getElementById('rewardRarity');
        rarityText.innerText = rarityNames[rarity];
        rarityText.style.color = rarityColors[rarity];

        document.getElementById('marketTotal').innerText = `${stats.worldTotal} шт.`;
        document.getElementById('marketOwned').innerText = `${userInventory[item.id].count} шт.`;
        document.getElementById('marketPrice').innerText = `${stats.price.toFixed(3)} 🪙`;

        const rewardBorder = document.getElementById('rewardBorder');
        if (rarity === 'secret') {
            rewardBorder.style.borderColor = "#ff007f";
            rewardBorder.style.boxShadow = "0 0 35px rgba(255, 0, 127, 0.6)";
        } else {
            rewardBorder.style.borderColor = rarityColors[rarity];
            rewardBorder.style.boxShadow = `0 0 25px ${rarityColors[rarity]}40`;
        }

        document.getElementById('rewardModal').classList.add('active');
        renderInventory();
    }

    // ЛОГИКА ДОБАВЛЕНИЯ ПРЕДМЕТОВ В КОНТРАКТ-МИКСЕР (ЛЮБЫЕ РЕДКОСТИ)
    window.toggleItemToCraft = function(id) {
        if (currentMode !== 'contract') {
            const item = userInventory[id];
            if (item) {
                let stats = calculateMarketStats(id, item.rarity, item.basePrice, item.count);
                document.getElementById('rewardModalTitle').innerText = "📊 ИНФО-КАРТОЧКА NFT";
                document.getElementById('rewardIcon').innerText = item.icon;
                document.getElementById('rewardName').innerText = item.name;
                const rText = document.getElementById('rewardRarity');
                rText.innerText = rarityNames[item.rarity]; rText.style.color = rarityColors[item.rarity];
                document.getElementById('marketTotal').innerText = `${stats.worldTotal} шт.`;
                document.getElementById('marketOwned').innerText = `${item.count} шт.`;
                document.getElementById('marketPrice').innerText = `${stats.price.toFixed(3)} 🪙`;
                document.getElementById('rewardModal').classList.add('active');
            }
            return;
        }

        const item = userInventory[id];
        if (!item) return;

        let alreadyAddedCount = selectedCraftItems.filter(itemId => itemId === id).length;
        if (alreadyAddedCount >= item.count) {
            if (tg && tg.showAlert) tg.showAlert("У вас больше нет свободных копий этого предмета!");
            return;
        }

        if (selectedCraftItems.length >= 10) {
            if (tg && tg.showAlert) tg.showAlert("В контракт нельзя положить больше 10 предметов!");
            return;
        }

        if (item.rarity === 'secret') {
            if (tg && tg.showAlert) tg.showAlert("Секретные предметы нельзя использовать в контракте!");
            return;
        }

        selectedCraftItems.push(id);
        if (tg && tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        
        updateContractUI();
        renderInventory();
        loadSavedTitle();
    }
    </script>
</body>
</html>
