<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TheBSgorm VIP Web3 Hub</title>
    <!-- Официальный скрипт Telegram Web App -->
    <script src="https://telegram.org"></script>
    <style>
        :root {
            --bg-dark: #03001e;
            --neon-pink: #ff007f;
            --neon-purple: #7928ca;
            --neon-cyan: #00f2fe;
            --neon-blue: #0072ff;
            --glass: rgba(15, 23, 42, 0.55);
            --border-glass: rgba(255, 255, 255, 0.08);
        }

        @keyframes cyberPulse {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: radial-gradient(circle at 50% 0%, #110033 0%, var(--bg-dark) 70%);
            background-attachment: fixed; color: #fff; margin: 0; padding: 25px 15px; 
            display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh; box-sizing: border-box; overflow-x: hidden;
        }

        /* МЕГА-АВАТАР С НЕОНОВЫМ ПЕРЕЛИВОМ */
        .avatar-zone { 
            width: 125px; height: 125px; 
            background: linear-gradient(-45deg, var(--neon-cyan), var(--neon-purple), var(--neon-pink));
            background-size: 300% 300%; animation: cyberPulse 6s infinite ease-in-out;
            border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 55px; 
            box-shadow: 0 0 35px rgba(0, 242, 254, 0.4), inset 0 0 15px rgba(255,255,255,0.3); 
            margin-top: 20px; border: 2px solid rgba(255,255,255,0.2);
        }

        h1 { font-size: 28px; font-weight: 950; margin: 18px 0 4px 0; letter-spacing: 1px; text-transform: uppercase; background: linear-gradient(90deg, #fff, #93c5fd); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .subtitle { font-size: 13px; color: var(--neon-cyan); text-shadow: 0 0 8px rgba(0, 242, 254, 0.4); opacity: 0.9; margin-bottom: 30px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; }
        .menu-container { width: 100%; max-width: 380px; display: flex; flex-direction: column; gap: 14px; }
        
        /* КНОПКИ МЕНЮ С ЭФФЕКТОМ ДЫХАНИЯ И ОБЪЕМА */
        .hub-main-btn {
            width: 100%; padding: 18px; border-radius: 18px; font-size: 15px; font-weight: 800; 
            color: #fff; border: none; cursor: pointer; display: flex; align-items: center; 
            justify-content: space-between; box-sizing: border-box;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .hub-main-btn:active { transform: scale(0.96); filter: brightness(1.2); }
        
        /* АНИМАЦИИ ДЫХАНИЯ ДЛЯ РАЗНЫХ КНОПОК */
        .btn-blue { background: linear-gradient(135deg, #00f2fe, #0072ff); border: 1px solid rgba(255,255,255,0.15); animation: breatheBlue 3s infinite ease-in-out; }
        .btn-cyan { background: linear-gradient(135deg, #7928ca, #ff007f); border: 1px solid rgba(255,255,255,0.15); animation: breathePink 3s infinite ease-in-out; }
        .btn-space { background: linear-gradient(135deg, #0284c7, #1e3a8a); border: 1px solid rgba(255,255,255,0.15); animation: breatheSpace 3s infinite ease-in-out; }
        
        @keyframes breatheBlue { 0%, 100% { box-shadow: 0 6px 15px rgba(0, 114, 255, 0.3); } 50% { box-shadow: 0 6px 25px rgba(0, 242, 254, 0.6); } }
        @keyframes breathePink { 0%, 100% { box-shadow: 0 6px 15px rgba(255, 0, 127, 0.3); } 50% { box-shadow: 0 6px 25px rgba(255, 0, 127, 0.6); } }
        @keyframes breatheSpace { 0%, 100% { box-shadow: 0 6px 15px rgba(2, 132, 199, 0.2); } 50% { box-shadow: 0 6px 25px rgba(0, 242, 254, 0.4); } }
        
        .btn-icon { font-size: 13px; opacity: 0.8; }

            <!-- ОКНО 2: КАРТА ПРОЕКТОВ (AQUAPHOBIA) ПОВЕРХ ВСЕГО -->
    <div class="feedback-modal" id="projectModal">
        <div class="fb-content">
            <h3 style="margin-top:0; color:#7dd3fc; font-weight:900; font-size:18px;">📁 КАРТА ПРОЕКТОВ</h3>
            <p style="font-size:12px; color:#94a3b8; margin:0 0 15px 0; font-weight:600; line-height:1.4;">Разработки и игровые релизы экосистемы TheBSgorm</p>
            
            <!-- Модуль твоей игры AQUAPHOBIA -->
            <div style="background: rgba(234, 179, 8, 0.04); border: 1px solid rgba(234, 179, 8, 0.35); border-radius: 16px; padding: 16px 12px; text-align: center; margin-bottom: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.2);">
                <span style="font-size:32px;">🎭</span>
                <div style="color: #eab308; font-size: 15px; font-weight: 900; margin: 4px 0 2px 0;">AQUAPHOBIA: Escape</div>
                <p style="font-size: 11px; color: #d4d4d8; font-weight: 500; line-height: 1.4; margin: 0; text-align: left;">Это атмосферное хоррор-выживание от первого лица! Игроку предстоит разгадать мрачные тайны подводного комплекса, спасаясь от жутких аномалий в условиях ограниченного кислорода. Проект находится в активной разработке!</p>
            </div>

            <button class="action-btn" style="background:#334155; color:#94a3b8; margin-bottom:0;" onclick="closeModal('projectModal')">Назад</button>
        </div>
    </div>

    <!-- ОКНО 3: СТИЛЬНАЯ VIP-ЗАЯВКА В ЛС -->
    <div class="feedback-modal" id="feedbackModal">
        <div class="fb-content">
            <h3 style="margin-top: 0; color: #7dd3fc; font-weight: 900; font-size: 18px; letter-spacing: 0.5px;">👑 VIP-ЗАЯВКА В ЛС</h3>
            <p style="font-size: 12px; color: #94a3b8; margin: 0; font-weight: 600; line-height: 1.4;">Есть вопрос, предложение по сотрудничеству или баг? Опиши суть, и заявка мгновенно прилетит прямо создателю!</p>
            <textarea class="fb-textarea" id="feedbackText" placeholder="Введите текст вашей заявки сюда..."></textarea>
            <button class="action-btn" style="background: linear-gradient(135deg, #00f2fe, #0072ff); color: #fff;" onclick="sendFeedback()">Отправить заявку</button>
            <button class="action-btn" style="background: #334155; color: #94a3b8; margin-bottom: 0;" onclick="closeModal('feedbackModal')">Отмена</button>
        </div>
    </div>

<script>
    const tg = window.Telegram?.WebApp;
    if (tg) { tg.ready(); tg.expand(); }

    // УПРАВЛЕНИЕ ПОЛНОЭКРАННЫМИ VIP ОКНАМИ
    window.openModal = function(modalId) { 
        document.getElementById(modalId).classList.add('active'); 
    }
    window.closeModal = function(modalId) { 
        document.getElementById(modalId).classList.remove('active'); 
    }

    // ОТПРАВКА ДАННЫХ В ТВОЙ СЕРВЕР FIREBASE REALTIME DATABASE
    window.sendFeedback = function() {
        const text = document.getElementById('feedbackText').value.trim();
        if (!text) {
            if (tg && tg.showAlert) tg.showAlert("Пожалуйста, введите текст заявки!");
            return;
        }

        const FIREBASE_URL = "https://firebaseio.com";

        const tgUser = tg?.initDataUnsafe?.user || {};
        const senderName = tgUser.first_name ? `${tgUser.first_name} ${tgUser.last_name || ''}`.trim() : "Анонимный пилот";
        const senderUsername = tgUser.username ? `@${tgUser.username}` : "нет юзернейма";
        const senderId = tgUser.id || "не определен";

        const requestData = {
            name: senderName,
            username: senderUsername,
            userId: senderId,
            message: text,
            time: new Date().toLocaleTimeString("ru-RU")
        };

        fetch(FIREBASE_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(requestData)
        })
        .then(response => {
            if (response.ok) {
                if (tg && tg.showAlert) {
                    tg.showAlert("✅ Ваша VIP-заявка успешно занесена в базу данных Firebase!");
                }
                closeModal('feedbackModal');
                document.getElementById('feedbackText').value = "";
            } else {
                if (tg && tg.showAlert) tg.showAlert("❌ Ошибка отправки. Проверьте правила Rules в Firebase.");
            }
        })
        .catch(error => console.error("Ошибка:", error));
    }
</script>
</body>
</html>
