<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Бот-Помощник TheBSgorm</title>
    <!-- Официальный скрипт Telegram Web App -->
    <script src="https://telegram.org"></script>
    <style>
        :root {
            --bg-color: #02040a;
            --text-color: #f1f5f9;
            --btn-bg: #38bdf8;
            --btn-text: #ffffff;
            --card-bg: rgba(11, 19, 43, 0.75); /* Космическое темное стекло */
            --soft-blue: #7dd3fc;  
            --sky-blue: #38bdf8;   
            --deep-blue: #0052d4;  
            --neon-glow: rgba(56, 189, 248, 0.25);
            --glass-border: rgba(56, 189, 248, 0.18); /* Лазурный контур */
        }

        /* Анимация перелива глубокого космоса */
        @keyframes spaceGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(-45deg, #02040a, #0b1329, #1c2541, #030712);
            background-size: 300% 300%;
            animation: spaceGradient 14s ease infinite;
            background-attachment: fixed;
            color: var(--text-color);
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; box-sizing: border-box; overflow-x: hidden;
        }

        /* --- СТИЛИ КОСМИЧЕСКОГО ЗАГРУЗЧИКА (SPLASH SCREEN) --- */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #020208; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.5s ease, pointer-events 0.5s ease; overflow: hidden;
        }
        
        .space-glow {
            position: absolute; width: 350px; height: 350px;
            background: radial-gradient(circle, rgba(56, 189, 248, 0.2) 0%, transparent 70%);
            top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 1;
        }

        .star {
            position: absolute; background: linear-gradient(to top, rgba(255,255,255,0), #ffffff);
            border-radius: 99px; bottom: -50px; animation: flyUp linear infinite; z-index: 2;
            box-shadow: 0 0 12px rgba(255, 255, 255, 0.8);
        }

        @keyframes flyUp {
            0% { transform: translateY(0) scale(0.3); opacity: 0; }
            15% { opacity: 1; }
            100% { transform: translateY(-115vh) scale(1.2); opacity: 0; }
        }

        .splash-content { display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; }
        
        .rocket-splash {
            width: 85px; height: 85px; border-radius: 50%;
            background: linear-gradient(135deg, #38bdf8, #818cf8);
            display: flex; align-items: center; justify-content: center; font-size: 40px;
            border: 3px solid rgba(255, 255, 255, 0.25); box-shadow: 0 0 30px rgba(56, 189, 248, 0.6);
            animation: bounceIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) both, rocketFly 2.2s ease-in-out infinite 0.8s;
        }

        @keyframes bounceIn { from { opacity: 0; transform: scale(0.3); } to { opacity: 1; transform: scale(1); } }
        @keyframes rocketFly { 0% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-8px) rotate(6deg); } 100% { transform: translateY(0) rotate(0deg); } }

        .splash-title {
            font-size: 38px; font-weight: 900; color: #ffffff; margin: 14px 0 0 0; letter-spacing: 3px; text-transform: uppercase;
            text-shadow: 0 2px 12px rgba(0,0,0,0.9), 0 0 20px rgba(56, 189, 248, 0.5);
            animation: fadeInText 1s ease-out 0.4s both; font-family: 'Arial Black', sans-serif;
        }
        .splash-sub {
            font-size: 14px; font-weight: 800; color: #7dd3fc; letter-spacing: 5px; text-transform: uppercase; margin-top: 3px; opacity: 0.9;
            animation: fadeInText 1s ease-out 0.6s both;
        }

        @keyframes fadeInText { from { opacity: 0; transform: translateY(12px); filter: blur(6px); } to { opacity: 1; transform: translateY(0); filter: blur(0); } }

        /* --- СТИЛИ КОСМИЧЕСКОГО ИНТЕРФЕЙСА ХАБА --- */
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Пульсирующий неоновый контур у кнопок («Дыхание») */
        @keyframes космическийПульс {
            0% { transform: scale(1); box-shadow: 0 5px 15px rgba(0,0,0,0.3), 0 0 0px var(--neon-glow); }
            50% { transform: scale(1.02); box-shadow: 0 8px 25px rgba(0,0,0,0.4), 0 0 15px var(--neon-glow); border-color: var(--soft-blue); }
            100% { transform: scale(1); box-shadow: 0 5px 15px rgba(0,0,0,0.3), 0 0 0px var(--neon-glow); }
        }

        .container { width: 100%; max-width: 400px; text-align: center; animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) both; }

        .avatar {
            width: 95px; height: 95px; border-radius: 50%;
            background: linear-gradient(135deg, var(--soft-blue), var(--sky-blue));
            margin: 25px auto 18px; display: flex; align-items: center; justify-content: center; font-size: 40px;
            border: 3px solid rgba(255, 255, 255, 0.15); box-shadow: 0 0 25px rgba(56, 189, 248, 0.4);
            animation: rocketFly 3s infinite ease-in-out; transition: transform 0.3s;
        }

        h1 { font-size: 25px; margin: 0 0 6px 0; font-weight: 800; letter-spacing: -0.5px; text-shadow: 0 2px 10px rgba(0,0,0,0.4); }
        .subtitle { font-size: 14px; opacity: 0.7; margin-bottom: 35px; font-weight: 500; text-shadow: 0 1px 4px rgba(0,0,0,0.3); }

        .nav-buttons-block { display: flex; flex-direction: column; gap: 14px; width: 100%; }
        
        .nav-button {
            background: var(--card-bg); color: var(--text-color);
            border: 1px solid var(--glass-border); padding: 18px 22px; border-radius: 22px;
            font-size: 16px; font-weight: 700; display: flex; align-items: center; justify-content: space-between;
            cursor: pointer; text-decoration: none; backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            animation: космическийПульс 4s infinite ease-in-out; transition: border-color 0.2s, box-shadow 0.2s;
        }
        .nav-button:active { 
            animation: none !important;
            transform: scale(0.95) !important; 
            border-color: var(--soft-blue) !important;
            box-shadow: 0 0 15px rgba(125, 211, 252, 0.3) !important;
        }
        
        .primary-btn { 
            background: linear-gradient(135deg, #0284c7, #0369a1); 
            color: #ffffff; border: none;
            animation: космическийПульс 4s infinite ease-in-out 0.5s;
        }

        .stars-btn { 
            border: 1px solid rgba(255, 205, 0, 0.3); 
            background: rgba(255, 205, 0, 0.03);
            --neon-glow: rgba(255, 205, 0, 0.15);
            animation: космическийПульс 4s infinite ease-in-out 1s;
        }
        .stars-btn:active { border-color: #ffcd00 !important; box-shadow: 0 0 20px rgba(255, 205, 0, 0.4) !important; }
        
        .socials-trigger-btn { 
            background: linear-gradient(135deg, #0d9488, #0ea5e9); 
            color: #ffffff; border: none; 
            --neon-glow: rgba(14, 165, 233, 0.2);
            animation: космическийПульс 4s infinite ease-in-out 1.5s;
        }

        .projects-trigger-btn { 
            background: linear-gradient(135deg, var(--sky-blue), #025aa5); 
            color: #ffffff; border: none; margin-top: 4px; 
            --neon-glow: rgba(56, 189, 248, 0.35);
            animation: космическийПульс 3.5s infinite ease-in-out;
        }

        .icon { font-size: 22px; transition: transform 0.2s ease; }
        .nav-button:active .icon { transform: scale(1.18); }
        .arrow { opacity: 0.5; font-size: 14px; transition: transform 0.2s ease; }
        .nav-button:active .arrow { transform: translateX(3px); }

        /* --- СТИЛИ ОКНА МЕНЮ (КОСМИЧЕСКИЙ БОРТОВОЙ КОМПЬЮТЕР) --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(2, 4, 10, 0.5); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            display: flex; align-items: flex-end; justify-content: center;
            opacity: 0; pointer-events: none; transition: opacity 0.3s ease; z-index: 1000;
        }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }

        .modal-content {
            width: 100%; max-width: 450px; 
            background: rgba(11, 19, 43, 0.92); 
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border-top-left-radius: 28px; border-top-right-radius: 28px;
            padding: 24px; box-sizing: border-box;
            transform: translateY(100%); transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1);
            max-height: 85vh; display: flex; flex-direction: column;
            border-top: 1px solid rgba(56, 189, 248, 0.25);
            box-shadow: 0 -10px 40px rgba(0, 0, 0, 0.6);
        }
        .modal-overlay.active .modal-content { transform: translateY(0); }

        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
        .modal-title { font-size: 19px; font-weight: 800; letter-spacing: -0.3px; color: #7dd3fc; }
        .close-btn { 
            background: rgba(255, 255, 255, 0.06); border: 1px solid var(--glass-border); 
            color: var(--text-color); font-size: 13px; font-weight: 700; padding: 8px 14px; 
            border-radius: 12px; cursor: pointer; transition: background 0.2s;
        }
        .close-btn:active { background: rgba(255, 255, 255, 0.12); }

        /* Вкладки для проектов */
        .tabs { display: flex; gap: 6px; background: rgba(0, 0, 0, 0.3); padding: 5px; border-radius: 14px; margin-bottom: 18px; flex-shrink: 0; }
        .tab-btn {
            flex: 1; background: none; border: none; color: var(--text-color); padding: 11px 5px;
            font-size: 14px; font-weight: 700; border-radius: 10px; cursor: pointer; opacity: 0.5; transition: all 0.25s;
        }
        .tab-btn.active { background: var(--card-bg); opacity: 1; border: 1px solid var(--glass-border); box-shadow: 0 4px 10px rgba(0,0,0,0.2); color: #7dd3fc; }

        .projects-scroll-container { overflow-y: auto; flex: 1; display: flex; flex-direction: column; gap: 14px; padding-bottom: 15px; }
        .project-card {
            background: rgba(15, 23, 42, 0.6); border: 1px solid var(--glass-border);
            padding: 16px; border-radius: 20px; display: flex; flex-direction: column; gap: 8px; text-align: left;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15); animation: fadeInUp 0.4s ease both;
        }
        .project-card-header { display: flex; justify-content: space-between; align-items: center; }
        .project-name { font-weight: 800; font-size: 16px; }
        .project-id { font-size: 10px; opacity: 0.3; font-family: monospace; }
        
        .badge { font-size: 10px; font-weight: 800; padding: 5px 10px; border-radius: 20px; text-transform: uppercase; }
        .badge.current { background: rgba(56, 189, 248, 0.15); color: #7dd3fc; border: 1px solid rgba(56, 189, 248, 0.3); }
        .badge.planned { background: rgba(234, 179, 8, 0.15); color: #fde047; border: 1px solid rgba(234, 179, 8, 0.3); }
        .badge.finished { background: rgba(148, 163, 184, 0.15); color: #e2e8f0; border: 1px solid rgba(148, 163, 184, 0.3); }
        
        .project-desc { font-size: 13px; opacity: 0.85; line-height: 1.5; }
        .project-link { font-size: 13px; color: var(--soft-blue); text-decoration: none; font-weight: 700; }
        .empty-text { text-align: center; opacity: 0.4; padding: 30px; font-size: 14px; }

        /* Админ-панель */
        .admin-panel {
            display: none; background: rgba(0, 0, 0, 0.2); border: 1px dashed rgba(125, 211, 252, 0.2);
            border-radius: 20px; padding: 14px; margin-bottom: 18px; flex-direction: column; gap: 10px; flex-shrink: 0;
        }
        .admin-input, .admin-select {
            background: #0f172a; border: 1px solid rgba(255,255,255,0.08); color: var(--text-color);
            padding: 10px 14px; border-radius: 10px; font-size: 13px; outline: none;
        }
        .admin-panel-btn {
            background: linear-gradient(135deg, #0284c7, #0369a1); color: white; border: none;
            padding: 12px; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer;
        }
        .admin-controls { display: flex; gap: 6px; margin-top: 10px; padding-top: 10px; border-top: 1px dashed rgba(255,255,255,0.1); justify-content: flex-end; }
        .admin-btn { background: #334155; border: none; color: white; padding: 5px 12px; border-radius: 8px; font-size: 11px; font-weight: 700; cursor: pointer; }
        .admin-btn.delete { background: #ef4444; }
    </style>
</head>
<body>

<!-- 🚀 КОСМИЧЕСКИЙ ЭКРАН ЗАГРУЗКИ (SPLASH SCREEN) -->
<div id="splash-screen">
    <div class="space-glow"></div>
    <div class="star" style="left: 8%; width: 5px; height: 18px; animation-duration: 2.5s; animation-delay: 0.2s;"></div>
    <div class="star" style="left: 22%; width: 7px; height: 25px; animation-duration: 1.8s; animation-delay: 0s;"></div>
    <div class="star" style="left: 38%; width: 4px; height: 15px; animation-duration: 3.2s; animation-delay: 1s;"></div>
    <div class="star" style="left: 52%; width: 8px; height: 28px; animation-duration: 1.5s; animation-delay: 0.4s;"></div>
    <div class="star" style="left: 68%; width: 6px; height: 22px; animation-duration: 2.8s; animation-delay: 0.7s;"></div>
    <div class="star" style="left: 82%; width: 9px; height: 32px; animation-duration: 1.3s; animation-delay: 0.1s;"></div>
    <div class="star" style="left: 94%; width: 5px; height: 16px; animation-duration: 2.2s; animation-delay: 1.4s;"></div>
    <div class="star" style="left: 14%; width: 6px; height: 20px; animation-duration: 2s; animation-delay: 0.5s;"></div>
    <div class="star" style="left: 30%; width: 5px; height: 18px; animation-duration: 2.9s; animation-delay: 0.1s;"></div>
    <div class="star" style="left: 45%; width: 8px; height: 30px; animation-duration: 1.4s; animation-delay: 0.8s;"></div>
    <div class="star" style="left: 60%; width: 4px; height: 14px; animation-duration: 3.5s; animation-delay: 0.3s;"></div>
    <div class="star" style="left: 74%; width: 7px; height: 24px; animation-duration: 1.9s; animation-delay: 1.1s;"></div>
    <div class="star" style="left: 88%; width: 6px; height: 21px; animation-duration: 2.6s; animation-delay: 0.6s;"></div>
    <div class="splash-content">
        <div class="rocket-splash">🚀</div>
        <h1 class="splash-title">THEBSGORM</h1>
        <div class="splash-sub">Бот-Помощник</div>
    </div>
</div>

<!-- 📱 ГЛАВНЫЙ ИНТЕРФЕЙС АССИСТЕНТА -->
<div class="container">
    <div class="avatar">🚀</div>
    <h1>TheBSgorm</h1>
    <div class="subtitle">Официальный Бот-Помощник</div>
    <div class="nav-buttons-block">
        <a href="#" class="nav-button primary-btn" id="btn-contact"><span class="icon">💬</span> <span>Связь с TheBSgorm</span> <span class="arrow">▶</span></a>
        <button class="nav-button socials-trigger-btn" id="openSocialsBtn"><span class="icon">🌐</span> <span>Социальные сети</span> <span class="arrow">▼</span></button>
        <button class="nav-button projects-trigger-btn" id="openProjectsBtn"><span class="icon">📂</span> <span>Посмотреть проекты</span> <span class="arrow">▼</span></button>
        <a href="#" class="nav-button stars-btn" id="btn-stars"><span class="icon">⭐</span> <span>Поддержать (Донат Stars)</span> <span class="arrow">▶</span></a>
    </div>
</div>

<!-- ОКНО 1: СОЦИАЛЬНЫЕ СЕТИ -->
<div class="modal-overlay" id="socialsModal">
    <div class="modal-content">
        <div class="modal-header">
            <div class="modal-title">Мои Социальные Сети</div>
            <button class="close-btn" id="closeSocialsBtn">Закрыть</button>
        </div>
        <div class="projects-scroll-container">
            <a href="#" class="nav-button" id="social-tg" style="background: rgba(14, 165, 233, 0.1); border-color: rgba(14, 165, 233, 0.3); animation: none;"><span class="icon">📢</span> <span>Telegram Канал</span> <span class="arrow">▶</span></a>
            <a href="#" class="nav-button" id="social-yt" style="background: rgba(239, 68, 68, 0.1); border-color: rgba(239, 68, 68, 0.3); animation: none;"><span class="icon">📹</span> <span>YouTube Канал</span> <span class="arrow">▶</span></a>
            <a href="#" class="nav-button" id="social-tt" style="background: rgba(255, 255, 255, 0.05); border-color: rgba(255, 255, 255, 0.15); animation: none;"><span class="icon">🎵</span> <span>TikTok Профиль</span> <span class="arrow">▶</span></a>
            <a href="#" class="nav-button" id="social-rt" style="background: rgba(249, 115, 22, 0.1); border-color: rgba(249, 115, 22, 0.3); animation: none;"><span class="icon">🍊</span> <span>RuTube Канал</span> <span class="arrow">▶</span></a>
            <a href="#" class="nav-button" id="social-inst" style="background: rgba(236, 72, 153, 0.1); border-color: rgba(236, 72, 153, 0.3); animation: none;"><span class="icon">📸</span> <span>Instagram</span> <span class="arrow">▶</span></a>
        </div>
    </div>
</div>

<!-- ОКНО 2: ПРОЕКТЫ -->
<div class="modal-overlay" id="modalOverlay">
    <div class="modal-content">
        <div class="modal-header">
            <div class="modal-title">Проекты TheBSgorm</div>
            <button class="close-btn" id="closeProjectsBtn">Закрыть</button>
        </div>
        <div class="admin-panel" id="adminPanel">
            <input type="text" id="newProjName" class="admin-input" placeholder="Название проекта">
            <input type="text" id="newProjDesc" class="admin-input" placeholder="Описание проекта">
            <input type="text" id="newProjLink" class="admin-input" placeholder="Ссылка (если есть)">
            <select id="newProjStatus" class="admin-select">
                <option value="current">🔥 Вкладка: Есть</option>
                <option value="planned">⏳ Вкладка: Планируются</option>
                <option value="finished">✅ Вкладка: Завершены</option>
            </select>
            <button class="admin-panel-btn" id="addProjBtn">➕ Добавить новый проект</button>
        </div>
        <div class="tabs">
            <button class="tab-btn active" id="tab-current">🔥 Есть</button>
            <button class="tab-btn" id="tab-planned">⏳ Планируются</button>
            <button class="tab-btn" id="tab-finished">✅ Завершены</button>
        </div>
        <div class="projects-scroll-container" id="projectsContainer"></div>
    </div>
</div>

<script>
            // --- УНИВЕРСАЛЬНЫЙ ТАЙМЕР СКРЫТИЯ SPLASH SCREEN ---
    setTimeout(function() {
        var splash = document.getElementById('splash-screen');
        if (splash) {
            splash.style.opacity = '0';
            splash.style.pointerEvents = 'none';
            setTimeout(function() { splash.remove(); }, 500);
        }
    }, 2500);

    // --- БЕЗОПАСНАЯ НАСТРОЙКА ССЫЛОК ---
    const LINK_CONTACT = "https://t.me";  
    const ADMIN_USERNAME = "BSgormYou123";            
    const URL_TELEGRAM = "https://t.me";     
    const URL_YOUTUBE = "https://youtube.com"; 
    const URL_TIKTOK = "https://tiktok.com"; 
    const URL_RUTUBE = "https://rutube.ru"; 
    const URL_INSTAGRAM = "https://instagram.com"; 

    const defaultProjects = [
        { id: 1, name: "🤖 Направлятор Mini App", status: "current", badgeText: "Запущен", desc: "Текущее интерактивное приложение-визитка для удобной и быстрой навигации.", link: "" },
        { id: 2, name: "🎮 AQUAPHOBIA: Escape", status: "planned", badgeText: "В разработке", desc: "Моя будущая игра в Roblox. Приготовься встретиться со своими страхами и найти выход!", link: "" }
    ];

    let myProjects = JSON.parse(localStorage.getItem('savedProjects')) || defaultProjects;

    // Проверяем, запущен ли скрипт внутри Telegram
    const isTelegram = !!(window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initData);
    let tg = null;

    if (isTelegram) {
        tg = window.Telegram.WebApp;
        tg.ready(); 
        tg.expand();
    }

    let currentFilter = "current";
    const isOwner = true; 

    // Универсальная функция открытия ссылок (РАБОТАЕТ ВЕЗДЕ)
    function openLink(url) {
        if (isTelegram && tg && tg.HapticFeedback) {
            tg.HapticFeedback.impactOccurred('light');
        }
        if (isTelegram && tg && tg.openLink) {
            tg.openLink(url); // Открытие внутри Telegram
        } else {
            window.open(url, '_blank'); // Стандартное открытие в браузере (Хром, Сафари и т.д.)
        }
    }

    // Привязка событий клика
    document.getElementById('btn-contact').addEventListener('click', (e) => { e.preventDefault(); openLink(LINK_CONTACT); });
    document.getElementById('social-tg').addEventListener('click', (e) => { e.preventDefault(); openLink(URL_TELEGRAM); });
    document.getElementById('social-yt').addEventListener('click', (e) => { e.preventDefault(); openLink(URL_YOUTUBE); });
    document.getElementById('social-tt').addEventListener('click', (e) => { e.preventDefault(); openLink(URL_TIKTOK); });
    document.getElementById('social-rt').addEventListener('click', (e) => { e.preventDefault(); openLink(URL_RUTUBE); });
    document.getElementById('social-inst').addEventListener('click', (e) => { e.preventDefault(); openLink(URL_INSTAGRAM); });
    
    document.getElementById('btn-stars').addEventListener('click', (e) => { 
        e.preventDefault(); 
        if (isTelegram && tg && tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
        if (isTelegram && tg && tg.showAlert) {
            tg.showAlert('Функция доната настраивается!');
        } else {
            alert('Функция доната настраивается!');
        }
    });

    const projectsModal = document.getElementById('modalOverlay');
    const socialsModal = document.getElementById('socialsModal');
    const adminPanel = document.getElementById('adminPanel');

    document.getElementById('openProjectsBtn').addEventListener('click', () => {
        projectsModal.classList.add('active');
        if (isOwner) adminPanel.style.display = "flex";
        renderProjects();
    });
    document.getElementById('closeProjectsBtn').addEventListener('click', () => { projectsModal.classList.remove('active'); });

    document.getElementById('openSocialsBtn').addEventListener('click', () => { socialsModal.classList.add('active'); });
    document.getElementById('closeSocialsBtn').addEventListener('click', () => { socialsModal.classList.remove('active'); });

    function setupTabs() {
        const tabs = { 'tab-current': 'current', 'tab-planned': 'planned', 'tab-finished': 'finished' };
        Object.keys(tabs).forEach(tabId => {
            document.getElementById(tabId).addEventListener('click', (e) => {
                document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
                e.currentTarget.classList.add('active');
                currentFilter = tabs[tabId];
                renderProjects();
            });
        });
    }

    document.getElementById('addProjBtn').addEventListener('click', () => {
        const nameInput = document.getElementById('newProjName');
        const descInput = document.getElementById('newProjDesc');
        const linkInput = document.getElementById('newProjLink');
        const statusSelect = document.getElementById('newProjStatus');

        if (!nameInput.value.trim() || !descInput.value.trim()) {
            if (isTelegram && tg && tg.showAlert) tg.showAlert("Заполните Название и Описание!");
            else alert("Заполните Название и Описание!");
            return;
        }

        let badgeText = "Запущен";
        if (statusSelect.value === "planned") badgeText = "В разработке";
        if (statusSelect.value === "finished") badgeText = "Архив";

        const newProject = {
            id: Date.now(),
            name: nameInput.value.trim(),
            status: statusSelect.value,
            badgeText: badgeText,
            desc: descInput.value.trim(),
            link: linkInput.value.trim()
        };

        myProjects.push(newProject);
        localStorage.setItem('savedProjects', JSON.stringify(myProjects));
        nameInput.value = ""; descInput.value = ""; linkInput.value = "";

        if (isTelegram && tg && tg.notificationOccurred) tg.notificationOccurred('success');
        currentFilter = newProject.status;
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(`tab-${currentFilter}`).classList.add('active');
        renderProjects();
    });

    window.moveProject = function(id, newStatus, newBadge) {
        const proj = myProjects.find(p => p.id === id);
        if (proj) {
            proj.status = newStatus;
            proj.badgeText = newBadge;
            localStorage.setItem('savedProjects', JSON.stringify(myProjects));
            renderProjects();
        }
    }

    window.deleteProject = function(id) {
        myProjects = myProjects.filter(p => p.id !== id);
        localStorage.setItem('savedProjects', JSON.stringify(myProjects));
        renderProjects();
    }

    function renderProjects() {
        const container = document.getElementById('projectsContainer');
        container.innerHTML = "";
        const filtered = myProjects.filter(p => p.status === currentFilter);

        if (filtered.length === 0) {
            container.innerHTML = `<div class="empty-text">Здесь пока ничего нет... 📁</div>`;
            return;
        }

        filtered.forEach(project => {
            const card = document.createElement('div');
            card.className = 'project-card';
            let linkHTML = project.link ? `<a href="#" class="project-link" data-url="${project.link}">Открыть →</a>` : '';
            
            let adminHTML = `
                <div class="admin-controls">
                    <span class="project-id">ID: ${project.id}</span>
                    <div style="display: flex; gap: 4px; margin-left: auto;">
                        ${project.status !== 'current' ? `<button class="admin-btn" onclick="moveProject(${project.id}, 'current', 'Запущен')">В 'Есть'</button>` : ''}
                        ${project.status !== 'planned' ? `<button class="admin-btn" onclick="moveProject(${project.id}, 'planned', 'В разработке')">В 'Планы'</button>` : ''}
                        ${project.status !== 'finished' ? `<button class="admin-btn" onclick="moveProject(${project.id}, 'finished', 'Архив')">В 'Завершенные'</button>` : ''}
                        <button class="admin-btn delete" onclick="deleteProject(${project.id})">❌ Удалить</button>
                    </div>
                </div>
            `;

            card.innerHTML = `
                <div class="project-card-header">
                    <span class="project-name">${project.name}</span>
                    <span class="badge ${project.status}">${project.badgeText}</span>
                </div>
                <div class="project-desc">${project.desc}</div>
                ${linkHTML} ${adminHTML}
            `;

            if (project.link) {
                card.querySelector('.project-link').addEventListener('click', (e) => {
                    e.preventDefault();
                    openLink(e.currentTarget.getAttribute('data-url'));
                });
            }
            container.appendChild(card);
        });
    }

    setupTabs();

</script>
</body>
</html>
